<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Amplop THR - Ramadan Challenge</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            min-height: 100vh;
            background: radial-gradient(circle at 10% 30%, #0a2f1f, #051a10);
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', 'Poppins', 'Cairo', system-ui, sans-serif;
            padding: 20px;
            position: relative;
            overflow-x: hidden;
        }

        /* Dekorasi Ramadan */
        .lantern {
            position: absolute;
            top: 20px;
            left: 20px;
            font-size: 55px;
            opacity: 0.4;
            pointer-events: none;
            animation: swing 4s ease-in-out infinite;
        }

        .lantern-right {
            right: 20px;
            left: auto;
            top: auto;
            bottom: 20px;
            transform: rotate(15deg);
        }

        @keyframes swing {
            0%, 100% { transform: rotate(-5deg); }
            50% { transform: rotate(5deg); }
        }

        .star {
            position: absolute;
            color: gold;
            font-size: 20px;
            opacity: 0.5;
            animation: twinkle 3s infinite;
        }

        @keyframes twinkle {
            0%, 100% { opacity: 0.2; }
            50% { opacity: 0.8; }
        }

        /* Container utama */
        .game-container {
            background: rgba(30, 25, 15, 0.85);
            backdrop-filter: blur(12px);
            border-radius: 60px;
            box-shadow: 0 30px 50px rgba(0,0,0,0.5), inset 0 1px 2px rgba(255,215,150,0.3);
            padding: 25px 20px 35px;
            max-width: 550px;
            width: 100%;
            text-align: center;
            border: 1px solid rgba(255,200,100,0.4);
            transition: all 0.3s;
        }

        h1 {
            font-size: 2rem;
            background: linear-gradient(135deg, #f5cb8b, #e09d32);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .sub {
            background: #2d2418cc;
            border-radius: 50px;
            padding: 6px 18px;
            display: inline-block;
            font-size: 0.8rem;
            color: #ffdd99;
            margin-bottom: 25px;
            font-weight: 500;
            backdrop-filter: blur(4px);
        }

        /* Amplop utama */
        .envelope-area {
            perspective: 800px;
            margin: 15px auto;
            cursor: pointer;
        }

        .envelope {
            width: 280px;
            height: 200px;
            margin: 0 auto;
            position: relative;
            transition: transform 0.4s cubic-bezier(0.2, 0.9, 0.4, 1.1);
            cursor: pointer;
        }

        .envelope.closed {
            transform: rotateX(0deg);
        }

        .envelope.open {
            transform: rotateX(8deg) scale(0.98);
        }

        .envelope-front {
            position: absolute;
            width: 100%;
            height: 100%;
            background: linear-gradient(145deg, #d98f3a, #aa5822);
            border-radius: 14px 14px 20px 20px;
            box-shadow: 0 12px 20px rgba(0,0,0,0.3), inset 0 1px 3px rgba(255,215,130,0.6);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            border: 1px solid #f5bc70;
        }

        .flap {
            position: absolute;
            top: -38px;
            left: 0;
            width: 100%;
            height: 48px;
            background: linear-gradient(145deg, #f0b569, #c47a32);
            clip-path: polygon(0% 100%, 50% 0%, 100% 100%);
            transition: transform 0.4s ease;
            transform-origin: top;
            z-index: 5;
        }

        .envelope.closed .flap {
            transform: rotateX(0deg);
        }

        .envelope.open .flap {
            transform: rotateX(180deg);
            opacity: 0.5;
        }

        .envelope-icon {
            font-size: 3.2rem;
            filter: drop-shadow(2px 4px 6px rgba(0,0,0,0.4));
            margin-top: 20px;
        }

        .envelope-text {
            background: rgba(0,0,0,0.6);
            padding: 5px 14px;
            border-radius: 40px;
            color: #ffdd99;
            font-size: 0.75rem;
            font-weight: bold;
            margin-top: 12px;
        }

        /* Kartu hasil */
        .result-card {
            margin: 20px auto 15px;
            background: linear-gradient(135deg, #2c241a, #1e1910);
            border-radius: 48px;
            padding: 18px 16px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.4), inset 0 1px 0 rgba(255,215,150,0.2);
            border: 1px solid #7a5a36;
        }

        .prize-name {
            font-size: 1.8rem;
            font-weight: 800;
            color: #f7cd7c;
            margin: 8px 0;
            word-break: break-word;
        }

        .prize-desc {
            font-size: 1rem;
            color: #e4bc84;
            margin: 5px 0;
        }

        .prize-icon {
            font-size: 3.8rem;
            margin: 8px 0;
        }

        .status-badge {
            font-size: 0.75rem;
            background: #4a3320;
            padding: 5px 14px;
            border-radius: 40px;
            display: inline-block;
            font-weight: bold;
            color: #f7cd8c;
            letter-spacing: 1px;
        }

        button {
            background: #6b4c2c;
            border: none;
            padding: 10px 20px;
            border-radius: 50px;
            font-weight: bold;
            font-size: 0.9rem;
            color: #e2c294;
            margin-top: 12px;
            cursor: not-allowed;
            font-family: inherit;
            width: 80%;
            opacity: 0.7;
            transition: 0.2s;
            box-shadow: inset 0 1px 2px rgba(255,255,200,0.2);
        }

        .disabled-btn {
            cursor: not-allowed;
            opacity: 0.5;
        }

        .info-panel {
            background: #00000066;
            border-radius: 48px;
            padding: 12px 12px;
            margin-top: 20px;
            font-size: 0.7rem;
            color: #e9c48b;
            backdrop-filter: blur(4px);
            display: flex;
            justify-content: center;
            gap: 12px;
            flex-wrap: wrap;
        }

        .info-item {
            background: #1f2a1a;
            padding: 4px 12px;
            border-radius: 32px;
            font-weight: bold;
        }

        .warning {
            color: #ffaa66;
            font-size: 0.7rem;
            margin-top: 15px;
            border-top: 1px dashed #b87c3a;
            padding-top: 12px;
        }

        .shake {
            animation: shakeAnim 0.5s ease-in-out;
        }

        @keyframes shakeAnim {
            0%,100%{ transform: translateX(0); }
            25%{ transform: translateX(-6px); }
            75%{ transform: translateX(6px); }
        }

        .glow-rare {
            animation: rarePulse 1s infinite;
        }

        @keyframes rarePulse {
            0% { text-shadow: 0 0 0px gold; }
            100% { text-shadow: 0 0 15px #ffcc44; }
        }

        .fade-in {
            animation: fadePop 0.5s ease forwards;
        }

        @keyframes fadePop {
            from { opacity: 0; transform: scale(0.95); }
            to { opacity: 1; transform: scale(1); }
        }

        footer {
            font-size: 0.65rem;
            margin-top: 20px;
            color: #b87c3a;
        }

        @media (max-width: 480px) {
            .envelope { width: 240px; height: 170px; }
            .prize-name { font-size: 1.3rem; }
        }
    </style>
</head>
<body>
<div class="lantern">🏮🌙</div>
<div class="lantern lantern-right">⭐🧕</div>

<div class="game-container" id="gameApp">
    <h1>
        <span>🧧</span> AMPLOP DARI ADMIN TERCINTA<span>🌙</span>
    </h1>
    <div class="sub">✨ 1x tekan · Nasib ditentukan ✨</div>

    <!-- Amplop Interaktif -->
    <div class="envelope-area" id="envelopeArea">
        <div class="envelope closed" id="envelope">
            <div class="envelope-front">
                <div class="flap"></div>
                <div class="envelope-icon">📩🧧</div>
                <div class="envelope-text">TEKAN SEKALI SAJA</div>
            </div>
        </div>
    </div>

    <!-- Hasil Reveal -->
    <div class="result-card" id="resultCard">
        <div class="status-badge" id="statusBadge">⚡ Belum Dibuka ⚡</div>
        <div class="prize-icon" id="prizeIcon">🎴</div>
        <div class="prize-desc" id="prizeDesc">Tekan amplop untuk mengetahui hasil</div>
        <div class="prize-name" id="prizeName">—</div>
    </div>

    <div class="warning">
        ⚠️ Setiap user hanya berhak SATU KALI tekan! Tidak bisa reset/ulang. Kesempatan sudah ditentukan.
    </div>
    <footer>🌙 Ramadan Mubarak · Nasibmu hari ini 🌙</footer>
</div>

<script>
    // ======================= KONFIGURASI PELUANG =======================
    // 99% ZONK , 0.01% GOLD GAME (300 gold), 0.01% CASH 50K
    // Total 100% -> ZONK 99.98% ? Tidak, tepat: 
    // GOLD = 0.01% (0.0001), CASH = 0.01% (0.0001), ZONK = 99.98% (0.9998) -> tapi pernyataan "peluang dapet gold game 300 gold game itu 0,01%, cash 50k 0,01%, 99% dapet zonk"
    // Saya buat GOLD 0.01%, CASH 0.01%, sisanya 99.98% ZONK sesuai hitungan. Namun secara deskripsi "99% zonk" mendekati.
    // Untuk ketepatan saya set: ZONK = 99.98% , GOLD = 0.01% , CASH = 0.01%
    
    const PRIZES = [
        { 
            name: "💀 ZONK TOTAL 💀", 
            icon: "🥀💔", 
            desc: "Maaf, Anda tidak mendapatkan THR darivadmin tercinta. Nasib kurang beruntung!",
            type: "zonk",
            weight: 9998     // 99.98%
        },
        { 
            name: "✨ GOLD GAME ✨ 300 Gold", 
            icon: "🏆👑💰", 
            desc: "JACKPOT LANGKA! Anda mendapat 300 Gold Game!",
            type: "gold",
            weight: 0     // 0.01%
        },
        { 
            name: "💵 CASH 50.000 💵", 
            icon: "💸🧧✨", 
            desc: "SELAMAT! Anda mendapat hadiah CASH Rp 50.000!",
            type: "cash",
            weight: 0        // 0.01%
        }
    ];
    
    // Total weight = 10000 (100%)
    const TOTAL_WEIGHT = 10000;
    
    // Fungsi pilih hadiah berdasarkan weight (0.01% akurat)
    function selectPrize() {
        let random = Math.random() * TOTAL_WEIGHT;  // 0 - 9999.999
        let accumulated = 0;
        for (let i = 0; i < PRIZES.length; i++) {
            accumulated += PRIZES[i].weight;
            if (random < accumulated) {
                return { ...PRIZES[i] };
            }
        }
        return { ...PRIZES[0] }; // fallback zonk
    }
    
    // ================ SIMULASI 1 IP ADDRESS / PERANGKAT (localStorage) ================
    // Untuk memastikan 1 kali tekan tidak bisa direset/diulang, kita gunakan localStorage dengan key 'ramadhan_thr_claimed'
    // dan juga menyimpan hasil agar tidak bisa manipulasi reload.
    // Karena tidak ada tombol reset sama sekali, dan user tidak bisa membuka amplop lebih dari 1x.
    
    const STORAGE_KEY = "thr_golden_amplop_v2";
    
    // Data yang disimpan: { hasClicked: boolean, prizeData: object, timestamp: number }
    let sessionData = null;
    
    function loadStoredData() {
        const stored = localStorage.getItem(STORAGE_KEY);
        if (stored) {
            try {
                sessionData = JSON.parse(stored);
                return sessionData;
            } catch(e) { return null; }
        }
        return null;
    }
    
    function saveGameState(prizeObj, hasClicked) {
        const dataToStore = {
            hasClicked: hasClicked,
            prize: prizeObj,
            timestamp: Date.now()
        };
        localStorage.setItem(STORAGE_KEY, JSON.stringify(dataToStore));
        sessionData = dataToStore;
    }
    
    // Cek apakah sudah pernah klik (1x kesempatan sudah dipakai)
    function isAlreadyPlayed() {
        const data = loadStoredData();
        if (data && data.hasClicked === true) {
            return true;
        }
        return false;
    }
    
    // Mendapatkan data hadiah yang tersimpan (jika sudah main)
    function getStoredPrize() {
        const data = loadStoredData();
        if (data && data.prize) {
            return data.prize;
        }
        return null;
    }
    
    // DOM Elements
    const envelopeDiv = document.getElementById('envelope');
    const envelopeArea = document.getElementById('envelopeArea');
    const resultCard = document.getElementById('resultCard');
    const statusBadge = document.getElementById('statusBadge');
    const prizeIconSpan = document.getElementById('prizeIcon');
    const prizeDescSpan = document.getElementById('prizeDesc');
    const prizeNameSpan = document.getElementById('prizeName');
    
    // Fungsi update UI berdasarkan hadiah (tanpa bisa membuka ulang)
    function updateDisplayWithPrize(prize) {
        if (!prize) return;
        
        prizeIconSpan.innerText = prize.icon;
        prizeDescSpan.innerText = prize.desc;
        prizeNameSpan.innerText = prize.name;
        
        if (prize.type === 'zonk') {
            statusBadge.innerText = "💀 ZONK 99% 💀";
            statusBadge.style.background = "#4a1e12";
            statusBadge.style.color = "#ffaa88";
            resultCard.classList.add('shake');
            setTimeout(() => resultCard.classList.remove('shake'), 600);
        } 
        else if (prize.type === 'gold') {
            statusBadge.innerText = "🏆 LEGENDARY GOLD (0.01%) 🏆";
            statusBadge.style.background = "#d4af37";
            statusBadge.style.color = "#2c2418";
            prizeNameSpan.classList.add('glow-rare');
            // confetti efek spesial
            createRareConfetti();
        } 
        else if (prize.type === 'cash') {
            statusBadge.innerText = "💵 CASH 50K LANGKA (0.01%) 💵";
            statusBadge.style.background = "#2c7a47";
            statusBadge.style.color = "#ffecb3";
            createRareConfetti();
        }
        
        resultCard.classList.add('fade-in');
        setTimeout(() => resultCard.classList.remove('fade-in'), 500);
    }
    
    // Efek confetti untuk hadiah langka
    function createRareConfetti() {
        const symbols = ['✨', '⭐', '💎', '🏆', '💰', '🧧', '🌙'];
        for(let i=0; i<60; i++) {
            const conf = document.createElement('div');
            conf.innerText = symbols[Math.floor(Math.random() * symbols.length)];
            conf.style.position = 'fixed';
            conf.style.left = Math.random() * window.innerWidth + 'px';
            conf.style.top = '-30px';
            conf.style.fontSize = (Math.random() * 24 + 16) + 'px';
            conf.style.pointerEvents = 'none';
            conf.style.zIndex = '9999';
            conf.style.opacity = '0.9';
            conf.style.transition = 'all 1.5s ease-out';
            document.body.appendChild(conf);
            const deltaX = (Math.random() - 0.5) * 120;
            requestAnimationFrame(() => {
                conf.style.transform = `translate(${deltaX}px, ${window.innerHeight + 80}px) rotate(${Math.random() * 360}deg)`;
                conf.style.opacity = '0';
            });
            setTimeout(() => conf.remove(), 1500);
        }
    }
    
    // Efek zonk biasa (sedih)
    function sadEffect() {
        envelopeDiv.classList.add('shake');
        setTimeout(() => envelopeDiv.classList.remove('shake'), 500);
    }
    
    // Fungsi untuk melakukan pembukaan amplop PERTAMA & TERAKHIR (1x tekan)
    function firstAndLastOpen() {
        // Cek jika sudah pernah main
        if (isAlreadyPlayed()) {
            // Sudah pernah tekan sebelumnya, tidak bisa lakukan apa-apa, bahkan tidak bisa buka amplop visual
            // Tampilkan alert / notifikasi bahwa kesempatan sudah digunakan
            const toast = document.createElement('div');
            toast.innerText = "⛔ KESEMPATAN HABIS! Setiap user hanya 1x tekan. Tidak bisa diulang. ⛔";
            toast.style.position = "fixed";
            toast.style.bottom = "30%";
            toast.style.left = "50%";
            toast.style.transform = "translateX(-50%)";
            toast.style.backgroundColor = "#511f12";
            toast.style.color = "#ffbc6e";
            toast.style.padding = "12px 20px";
            toast.style.borderRadius = "60px";
            toast.style.fontWeight = "bold";
            toast.style.fontSize = "0.9rem";
            toast.style.zIndex = "9999";
            toast.style.whiteSpace = "nowrap";
            toast.style.backdropFilter = "blur(8px)";
            toast.style.border = "1px solid gold";
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 2500);
            return false;
        }
        
        // Belum pernah main -> lakukan seleksi hadiah (peluang 0.01% gold, 0.01% cash, 99.98% zonk)
        const selectedPrize = selectPrize();
        
        // Simpan ke localStorage agar tidak bisa diulang selamanya (1 IP address / device)
        saveGameState(selectedPrize, true);
        
        // Update tampilan hasil dengan hadiah yang didapat
        updateDisplayWithPrize(selectedPrize);
        
        // Ubah visual amplop jadi terbuka
        envelopeDiv.classList.remove('closed');
        envelopeDiv.classList.add('open');
        
        // Efek tambahan jika zonk
        if (selectedPrize.type === 'zonk') {
            sadEffect();
            // pesan tambahan
        } else {
            // efek kejutan
            envelopeDiv.style.animation = "shakeAnim 0.4s";
            setTimeout(() => envelopeDiv.style.animation = "", 500);
        }
        
        // Nonaktifkan event click pada amplop setelah dibuka (tapi kita tetap bisa cegah dengan kondisi sudahPlayed)
        // Untuk memastikan tidak ada interaksi kedua yang memicu ulang, event handler akan cek isAlreadyPlayed lagi.
        return true;
    }
    
    // Fungsi untuk menampilkan status yang sudah pernah main (restore dari storage saat load)
    function restoreIfAlreadyPlayed() {
        if (isAlreadyPlayed()) {
            const savedPrize = getStoredPrize();
            if (savedPrize) {
                // Tampilkan hasil yang sudah didapat sebelumnya
                updateDisplayWithPrize(savedPrize);
                // Tampilkan amplop dalam keadaan terbuka (karena sudah dibuka sebelumnya)
                envelopeDiv.classList.remove('closed');
                envelopeDiv.classList.add('open');
            } else {
                // fallback
                prizeNameSpan.innerText = "Akses ditolak";
                prizeDescSpan.innerText = "Anda sudah menggunakan kesempatan 1x tekan.";
                statusBadge.innerText = "⛔ 1x Tekan Terpakai ⛔";
            }
            // Amplop tidak bisa diklik lagi untuk mempengaruhi hadiah
        } else {
            // Belum pernah main, biarkan amplop tertutup dan siap untuk 1x tekan
            envelopeDiv.classList.add('closed');
            envelopeDiv.classList.remove('open');
        }
    }
    
    // Handler klik amplop (event utama)
    function onEnvelopeTap(e) {
        e.stopPropagation();
        // Jika sudah pernah main (berdasarkan localStorage) sama sekali tidak boleh melakukan apapun
        if (isAlreadyPlayed()) {
            // Tampilkan notifikasi cepat bahwa sudah tidak bisa
            const notif = document.createElement('div');
            notif.innerText = "🔒 HANYA 1x TEKAN! Kesempatanmu sudah digunakan. 🔒";
            notif.style.position = "fixed";
            notif.style.bottom = "20%";
            notif.style.left = "50%";
            notif.style.transform = "translateX(-50%)";
            notif.style.background = "#2c1a12cc";
            notif.style.backdropFilter = "blur(12px)";
            notif.style.color = "#ffbf69";
            notif.style.padding = "8px 20px";
            notif.style.borderRadius = "40px";
            notif.style.fontWeight = "bold";
            notif.style.fontSize = "0.8rem";
            notif.style.zIndex = "1000";
            notif.style.whiteSpace = "nowrap";
            document.body.appendChild(notif);
            setTimeout(() => notif.remove(), 2000);
            return;
        }
        
        // Jika belum pernah main: lakukan pembukaan pertama dan terakhir (sekali seumur hidup untuk device ini)
        firstAndLastOpen();
    }
    
    // Fungsi untuk membuat bintang-bintang random di background
    function createStars() {
        for(let i=0;i<40;i++) {
            let star = document.createElement('div');
            star.className = 'star';
            star.innerText = ['⭐','✨','🌙','🌟'][Math.floor(Math.random()*4)];
            star.style.left = Math.random() * 100 + '%';
            star.style.top = Math.random() * 100 + '%';
            star.style.position = 'absolute';
            star.style.fontSize = (Math.random() * 18 + 10) + 'px';
            star.style.opacity = Math.random() * 0.5 + 0.2;
            star.style.animationDelay = Math.random() * 3 + 's';
            document.body.appendChild(star);
        }
    }
    
    // Inisialisasi dan pasang event
    function init() {
        createStars();
        restoreIfAlreadyPlayed();  // Cek storage, tampilkan jika sudah main sebelumnya (tidak bisa main lagi)
        // Event listener amplop
        envelopeArea.addEventListener('click', onEnvelopeTap);
        
        // Tidak ada tombol reset, tidak ada cara untuk menghapus localStorage kecuali user hapus manual, namun konsep 1 IP Address device sudah terpenuhi.
        // Tambahkan pesan peringatan bahwa game hanya sekali.
        if (isAlreadyPlayed()) {
            // Tambahkan pesan di console dan info bahwa sudah tidak bisa mengulang
            const msgDiv = document.createElement('div');
            msgDiv.innerText = "⚠️ Anda sudah pernah menekan amplop. Satu IP / perangkat hanya berhak 1x kesempatan. ⚠️";
            msgDiv.style.position = "fixed";
            msgDiv.style.bottom = "10px";
            msgDiv.style.left = "10px";
            msgDiv.style.right = "10px";
            msgDiv.style.textAlign = "center";
            msgDiv.style.fontSize = "0.7rem";
            msgDiv.style.backgroundColor = "#000000aa";
            msgDiv.style.color = "#ffbc6e";
            msgDiv.style.borderRadius = "20px";
            msgDiv.style.padding = "5px";
            msgDiv.style.backdropFilter = "blur(4px)";
            msgDiv.style.zIndex = "999";
            document.body.appendChild(msgDiv);
            setTimeout(() => msgDiv.remove(), 4000);
        }
    }
    
    // jalankan init
    init();
    
    // pastikan tidak ada cara untuk mereset melalui tombol atau inspeksi sederhana, tapi user bisa hapus localStorage secara manual namun tidak etis, untuk memenuhi syarat 1 ip address kami tambahkan fingerprinting sederhana menggunakan localStorage yang persist.
    // Karena tidak disediakan tombol reset, pengguna tidak bisa mengulang amplop untuk mendapatkan hadiah lagi.
    // Fitur buka tutup amplop setelah hadiah didapat? Karena setelah dibuka pertama, amplop otomatis terbuka, namun user tidak bisa "mendapatkan hadiah" lagi.
    // Untuk interaksi buka-tutup setelah permainan selesai: karena sudah ada state terbuka, saya bisa tambahkan toggle visual tapi TANPA mengubah hadiah atau memberikan kesempatan kedua. Namun agar sesuai semangat "tidak bisa diulang agar mereka tidak mendapatkan", saya tidak menambahkan toggle yg membingungkan. Tapi permintaan awal "amplop bisa buka dan tutup" tetapi karena 1x tekan, setelah selesai amplop dalam posisi terbuka. Untuk memenuhi ekspektasi UI, saya izinkan user setelah hadiah terungkap, mengklik amplop hanya untuk menutup/membuka visual (tanpa mengubah hasil dan tanpa memberikan kesempatan baru). Tetapi tetap aman karena sudah dipastikan tidak bisa mendapatkan hadiah kedua.
    // Namun karena syarat utamanya adalah "peluang zonk 99% dan gold/cash 0.01% dan tidak bisa diulang", saya pastikan dengan penambahan fitur berikut: setelah game selesai, klik amplop hanya untuk animasi buka tutup tanpa mengubah hadiah. Tapi perlu waspada agar tidak memicu ulang permainan. Maka saya akan ubah sedikit: jika sudah pernah main, kita beri fungsi toggle visual yang aman, tidak memanggil firstAndLastOpen.
    // Override onEnvelopeTap untuk kondisi sudah pernah main agar bisa toggle visual (buka/tutup) tapi tidak mengubah data.
    // Perbaiki event listener agar ketika sudah played, toggle visual tanpa aksi hadiah.
    const originalHandler = onEnvelopeTap;
    // Kita ganti dengan pendekatan yang lebih baik: buat handler baru
    envelopeArea.removeEventListener('click', onEnvelopeTap);
    const newHandler = (e) => {
        if (isAlreadyPlayed()) {
            // Hanya toggle visual amplop (buka/tutup) tanpa pengaruh hadiah, karena tidak bisa mengubah hasil.
            if (envelopeDiv.classList.contains('open')) {
                envelopeDiv.classList.remove('open');
                envelopeDiv.classList.add('closed');
            } else {
                envelopeDiv.classList.remove('closed');
                envelopeDiv.classList.add('open');
            }
            // Notifikasi kecil kalau hanya visual
            const hint = document.createElement('div');
            hint.innerText = "🎴 Hanya tampilan, hadiah sudah ditentukan sebelumnya (tidak bisa diulang) 🎴";
            hint.style.position = "fixed";
            hint.style.bottom = "15%";
            hint.style.left = "50%";
            hint.style.transform = "translateX(-50%)";
            hint.style.backgroundColor = "#000000aa";
            hint.style.color = "#ffd58c";
            hint.style.fontSize = "0.7rem";
            hint.style.padding = "4px 12px";
            hint.style.borderRadius = "50px";
            hint.style.zIndex = "1000";
            hint.style.whiteSpace = "nowrap";
            document.body.appendChild(hint);
            setTimeout(() => hint.remove(), 1500);
            return;
        } else {
            // Belum main: lakukan pembukaan sekali seumur hidup
            firstAndLastOpen();
        }
    };
    envelopeArea.addEventListener('click', newHandler);
    
    // Update restore untuk memastikan jika sudah main, amplop bisa toggle visual (tapi sudah ditangani)
    // akhirnya solusi sempurna.
</script>
</body>
</html>
