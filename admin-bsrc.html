        body { background: var(--dark); color: var(--text-light); padding: 20px; }
        .card { background: var(--gray); border-radius: 20px; padding: 1.8rem; margin-bottom: 1.8rem; border: 1px solid var(--border); max-width: 1400px; margin-left: auto; margin-right: auto; box-shadow: 0 4px 15px rgba(0,0,0,0.3); }

        .card h3 { color: var(--yellow); margin: 1.2rem 0 0.7rem 0; font-size: 1rem; }
        .form-group { margin-bottom: 1.2rem; }
        .form-group label { display: block; margin-bottom: 0.4rem; font-weight: 600; color: var(--yellow); font-size: 0.85rem; }
        input, select, textarea { width: 100%; padding: 12px 16px; background: var(--gray-light); border: 1px solid var(--blue-light); border-radius: 12px; color: white; font-size: 0.9rem; outline: none; transition: all 0.2s ease; }
        input:focus, select:focus { border-color: var(--yellow); box-shadow: 0 0 0 3px rgba(255,214,0,0.2); background: var(--gray); }
        .btn { padding: 12px 28px; border: none; border-radius: 12px; font-weight: 700; cursor: pointer; transition: all 0.25s ease; font-size: 0.9rem; margin: 5px; display: inline-flex; align-items: center; gap: 10px; }
        .btn-primary { background: linear-gradient(135deg, var(--yellow), #FFB800); color: var(--blue); }
        .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(255,214,0,0.3); }
        .btn-outline { background: transparent; border: 2px solid var(--yellow); color: var(--yellow); }
        .btn-outline:hover { background: var(--yellow); color: var(--blue); transform: translateY(-2px); }
        .btn-danger { background: linear-gradient(135deg, var(--danger), #B91C1C); color: white; }
        .btn-danger:hover { transform: translateY(-2px); }
        .btn-success { background: linear-gradient(135deg, var(--success), #059669); color: white; }
        .btn-sm { padding: 6px 14px; font-size: 0.7rem; gap: 6px; }
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 1.5rem; margin-bottom: 2rem; }
        .stat-card { background: linear-gradient(135deg, var(--gray), #1f2436); border-radius: 20px; padding: 1.5rem; text-align: center; border-left: 5px solid var(--yellow); transition: all 0.3s ease; }
        .stat-card:hover { transform: translateY(-5px); }
        .stat-card i { font-size: 2.2rem; color: var(--yellow); margin-bottom: 0.7rem; }
        .stat-card h2 { font-size: 2.2rem; color: white; }
        .stat-card p { color: #8ba0c0; font-size: 0.85rem; }
        .table-wrapper { overflow-x: auto; border-radius: 16px; margin-top: 1rem; }
        table { width: 100%; border-collapse: collapse; font-size: 0.85rem; }
        th, td { padding: 14px 12px; text-align: left; border-bottom: 1px solid var(--border); vertical-align: middle; }
        th { color: var(--yellow); font-weight: 700; background: rgba(42,47,62,0.8); white-space: nowrap; }
        tr:hover td { background: rgba(255,214,0,0.05); }
        .slot-badge { display: inline-block; background: linear-gradient(135deg, var(--yellow), #FFB800); color: var(--blue); padding: 5px 12px; border-radius: 20px; font-weight: 800; font-size: 0.75rem; min-width: 55px; text-align: center; }
        .badge { display: inline-block; padding: 5px 14px; border-radius: 20px; font-size: 0.7rem; font-weight: 700; }
        .badge-active { background: linear-gradient(135deg, #10B981, #059669); color: white; }

        .action-btn { background: var(--gray-light); border: none; color: var(--yellow); cursor: pointer; margin: 0 4px; font-size: 0.9rem; padding: 8px 14px; border-radius: 10px; transition: all 0.2s; }

        .search-bar { display: flex; gap: 1rem; flex-wrap: wrap; margin-bottom: 1.5rem; align-items: center; }
        .search-bar input, .search-bar select { padding: 12px 18px; background: var(--gray-light); border: 1px solid var(--border); border-radius: 12px; color: white; font-size: 0.85rem; flex: 1; min-width: 180px; }

        .rank-list { display: flex; flex-direction: column; gap: 10px; margin-top: 15px; }
        .rank-item { background: var(--gray-light); border-radius: 14px; padding: 14px 20px; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; }
        .rank-item.top1 { background: linear-gradient(135deg, #2a1f0a, #1f2436); border-left: 5px solid #fbbf24; }

        .points-container { display: flex; flex-wrap: wrap; gap: 12px; margin: 15px 0; }
        .point-chip { background: var(--gray-light); border-radius: 30px; padding: 8px 16px; display: flex; align-items: center; gap: 12px; }

    function calcScore(rank, kills) { return (scoreRankPoints[rank] || 0) + (kills * scoreKillPoint); }
    function getPlayerScore(playerId) { let total=0; scoreMatches.forEach(m=>{ const r=m.results.find(r=>r.playerId===playerId); if(r) total+=calcScore(r.rank, r.kills); }); return total; }

    async function loadScoreData() {
        const playersSnap = await db.collection("players").where("status", "==", "active").get();
        scorePlayers = playersSnap.docs.map(doc => ({ id: doc.id, name: doc.data().playerName, slot: doc.data().slot || '-', perwakilan: doc.data().perwakilan || '-' }));
        const savedMatches = localStorage.getItem('bsrc_score_matches_solo');
        if(savedMatches) { scoreMatches = JSON.parse(savedMatches); if(scoreMatches.length) scoreNextMatchId = Math.max(...scoreMatches.map(m=>m.matchId)) + 1; }
        const savedRank = localStorage.getItem('bsrc_score_rankPoints_solo');
        if(savedRank) scoreRankPoints = JSON.parse(savedRank);
        const savedKill = localStorage.getItem('bsrc_score_killPoint_solo');
        if(savedKill) scoreKillPoint = parseFloat(savedKill);
    }
    
    async function getAvailableSlot(players) { const taken = players.map(p=>p.slot); for(let s of SLOTS) if(!taken.includes(s)) return s; return null; }
    async function loadCountdownSetting() { const settingDoc = await db.collection("settings").doc("tournament").get(); if (settingDoc.exists && settingDoc.data().countdownDate) countdownTarget = new Date(settingDoc.data().countdownDate); }
    async function saveCountdownSetting(newDate) { await db.collection("settings").doc("tournament").set({ countdownDate: newDate.toISOString() }); countdownTarget = newDate; }
    
    async function renderAdminPanel() {
        showLoading(true);
        await loadScoreData();
        await loadCountdownSetting();
        
        const playersSnap = await db.collection("players").get();
        const players = playersSnap.docs.map(doc => ({ id: doc.id, ...doc.data() }));
        const bannedSnap = await db.collection("bannedPlayers").get();
        const bannedPlayers = bannedSnap.docs.map(doc => doc.data());
        const winnerDoc = await db.collection("settings").doc("winner").get();
        let winner = winnerDoc.exists ? winnerDoc.data() : null;
        
        const activePlayers = players.filter(p=>p.status==="active");
        const targetDateForInput = countdownTarget.toISOString().slice(0,16);
        
        const html = `
            <div class="stats-grid">
                <div class="stat-card"><i class="fas fa-user"></i><h2>${players.length}</h2><p>Total Player</p></div>
                <div class="stat-card"><i class="fas fa-check-circle"></i><h2>${activePlayers.length}</h2><p>Player Aktif</p></div>
                <div class="stat-card"><i class="fas fa-ban"></i><h2>${bannedPlayers.length}</h2><p>Player Banned</p></div>
                <div class="stat-card"><i class="fas fa-chair"></i><h2>${activePlayers.length}/${SLOTS.length}</h2><p>Slot Terisi</p></div>
            </div>
            
            <div class="card"><h2>⏰ Pengaturan Countdown</h2>
                <div class="form-group"><label>Tanggal & Waktu Tournament</label><input type="datetime-local" id="countdownDateInput" value="${targetDateForInput}"></div>
                <button class="btn btn-primary" id="saveCountdownBtn"><i class="fas fa-save"></i> Simpan Countdown</button>
                <div style="margin-top:1rem"><p>Preview: <strong id="previewCountdown">-- : -- : --</strong></p></div>
            </div>
            
            <div class="card"><h2>🏆 Set Pemenang Tournament SOLO</h2>
                <div class="form-group"><label>🏅 Juara 1</label><select id="winner1Select"><option value="">- Kosongkan -</option>${activePlayers.map(p=>`<option value="${p.id}" ${winner?.winner1Id===p.id?'selected':''}>${escapeHtml(p.playerName)} (${p.slot})</option>`).join('')}</select></div>
                <div class="form-group"><label>🥈 Juara 2</label><select id="winner2Select"><option value="">- Kosongkan -</option>${activePlayers.map(p=>`<option value="${p.id}" ${winner?.winner2Id===p.id?'selected':''}>${escapeHtml(p.playerName)} (${p.slot})</option>`).join('')}</select></div>
                <div class="form-group"><label>🥉 Juara 3</label><select id="winner3Select"><option value="">- Kosongkan -</option>${activePlayers.map(p=>`<option value="${p.id}" ${winner?.winner3Id===p.id?'selected':''}>${escapeHtml(p.playerName)} (${p.slot})</option>`).join('')}</select></div>
                <button class="btn btn-success" id="setWinnerBtn"><i class="fas fa-crown"></i> Tetapkan Juara</button>
            </div>
            
            <div class="card"><h2>👤 Manajemen Player SOLO</h2>
                <div class="search-bar"><input type="text" id="searchAdmin" placeholder="Cari Player..."></div>
                <button class="btn btn-primary" id="addPlayerBtn"><i class="fas fa-plus"></i> Daftarkan Player Manual</button>
                <button class="btn btn-outline" id="exportAllDataBtn"><i class="fas fa-database"></i> Export Data Lengkap</button>
                <div class="table-wrapper"><table><thead><tr><th>Slot</th><th>Nama Player</th><th>Perwakilan</th><th>Provinsi</th><th>Kota</th><th>UID</th><th>Nickname</th><th>Status</th><th>Aksi</th></tr></thead><tbody id="adminPlayerList"></tbody></table></div>
                <div style="margin-top:1rem; display:flex; gap:1rem; flex-wrap:wrap"><button class="btn btn-danger" id="adminResetSlot">Reset Semua Slot</button><button class="btn btn-outline" id="adminCancelAll">Cancel Semua Peserta</button></div>
            </div>
            
            <div class="card"><h2>📊 SCORE MANAGER (SOLO)</h2>
                <div class="form-group"><label>Poin per Kill</label><input type="number" id="killPoint" value="${scoreKillPoint}" step="0.5"></div>
                <div id="pointsContainer" class="points-container"></div>
                <button id="addRankBtn" class="btn btn-outline btn-sm">+ Tambah Peringkat</button>
                <button id="resetRankBtn" class="btn btn-outline btn-sm">Reset Default Poin</button>
                <hr style="margin: 20px 0;">
                <button id="addMatchBtn" class="btn btn-primary"><i class="fas fa-plus"></i> Tambah Match</button>
                <button id="resetMatchesBtn" class="btn btn-danger">Reset Semua Match</button>
                <div id="matchesContainer" style="margin-top: 20px;"></div>
                <div style="margin-top: 20px;"><h3>🏅 Final Ranking SOLO</h3><div id="finalRanking" class="rank-list"></div></div>
            </div>
        `;
        
        document.getElementById("adminContent").innerHTML = html;
        
        // Countdown
        const updatePreview = () => { 
            const dateValue = document.getElementById("countdownDateInput").value; 
            if(dateValue){ 
                const target=new Date(dateValue), now=new Date(), diff=target-now; 
                if(diff<=0) document.getElementById("previewCountdown").innerText="Tournament LIVE!"; 
                else{ const d=Math.floor(diff/86400000), h=Math.floor((diff%86400000)/3600000), m=Math.floor((diff%3600000)/60000), s=Math.floor((diff%60000)/1000); 
                document.getElementById("previewCountdown").innerText=`${d}d ${h}h ${m}m ${s}s`; } 
            } 
        };
        document.getElementById("countdownDateInput")?.addEventListener("change",updatePreview); 
        updatePreview();
        document.getElementById("saveCountdownBtn")?.addEventListener("click",async()=>{ const dateValue=document.getElementById("countdownDateInput").value; if(dateValue){ await saveCountdownSetting(new Date(dateValue)); showToast("success","Countdown berhasil diupdate!"); updatePreview(); } });
        
        // Set Winner
        document.getElementById("setWinnerBtn")?.addEventListener("click", async () => {
            const w1 = document.getElementById("winner1Select")?.value || null;
            const w2 = document.getElementById("winner2Select")?.value || null;
            const w3 = document.getElementById("winner3Select")?.value || null;
            let winnerData = { winnerAt: new Date().toISOString() };
            if(w1) { const p = await db.collection("players").doc(w1).get(); winnerData.winner1Id = w1; winnerData.winner1Name = p.data()?.playerName; winnerData.winner1Wakil = p.data()?.perwakilan; }
            else { winnerData.winner1Id = null; winnerData.winner1Name = null; winnerData.winner1Wakil = null; }
            if(w2) { const p = await db.collection("players").doc(w2).get(); winnerData.winner2Id = w2; winnerData.winner2Name = p.data()?.playerName; winnerData.winner2Wakil = p.data()?.perwakilan; }
            else { winnerData.winner2Id = null; winnerData.winner2Name = null; winnerData.winner2Wakil = null; }
            if(w3) { const p = await db.collection("players").doc(w3).get(); winnerData.winner3Id = w3; winnerData.winner3Name = p.data()?.playerName; winnerData.winner3Wakil = p.data()?.perwakilan; }
            else { winnerData.winner3Id = null; winnerData.winner3Name = null; winnerData.winner3Wakil = null; }
            await db.collection("settings").doc("winner").set(winnerData);
            showToast("success", "Juara ditetapkan!");
            renderAdminPanel();
        });
        
        // Export Data
        document.getElementById("exportAllDataBtn")?.addEventListener("click",()=>{ 
            let csv="Nama Player,Perwakilan,WhatsApp,Provinsi,Kota,UID,Nickname,Slot,Status,Tanggal Daftar\n"; 
            players.forEach(p=>{ csv+=`"${p.playerName}","${p.perwakilan}","${p.whatsapp}","${p.provinsi||'-'}","${p.kota||'-'}","${p.uid||'-'}","${p.nickname||'-'}","${p.slot||'-'}","${p.status}","${p.createdAt||'-'}"\n`; }); 
            const blob=new Blob([csv],{type:"text/csv"}), link=document.createElement("a"); 
            link.href=URL.createObjectURL(blob); link.download="data_player_solo.csv"; link.click(); showToast("success","Data lengkap berhasil diexport"); 
        });
        
        // Points Settings
        const renderPoints = () => {
            const container = document.getElementById("pointsContainer");
            if(container) container.innerHTML = Object.keys(scoreRankPoints).map(Number).sort((a,b)=>a-b).map(rank => `<div class="point-chip"><span>Peringkat ${rank}</span><input type="number" id="rank_${rank}" value="${scoreRankPoints[rank]}" min="0" step="1" style="width:70px;"><button onclick="deleteRank(${rank})" style="background:#DC2626; border:none; border-radius:50%; width:24px; color:white; cursor:pointer;">✕</button></div>`).join('');
            Object.keys(scoreRankPoints).forEach(rank => { document.getElementById(`rank_${rank}`)?.addEventListener('change', (e) => { scoreRankPoints[rank] = parseFloat(e.target.value) || 0; saveScoreRankPoints(); renderAdminPanel(); }); });
        };
        renderPoints();
        
        document.getElementById("killPoint")?.addEventListener("change", (e) => { scoreKillPoint = parseFloat(e.target.value) || 1; saveScoreKillPoint(); renderAdminPanel(); });
        document.getElementById("addRankBtn")?.addEventListener("click", () => { let max = Math.max(...Object.keys(scoreRankPoints).map(Number), 0); scoreRankPoints[max+1] = 0; saveScoreRankPoints(); renderAdminPanel(); });
        document.getElementById("resetRankBtn")?.addEventListener("click", () => { scoreRankPoints = { 1:30,2:20,3:15,4:12,5:10,6:8,7:6,8:4,9:2,10:1 }; saveScoreRankPoints(); renderAdminPanel(); });
        document.getElementById("addMatchBtn")?.addEventListener("click", () => { scoreMatches.push({ matchId: scoreNextMatchId++, matchName: `Match ${scoreMatches.length+1}`, results: [] }); saveScoreMatches(); renderAdminPanel(); });
        document.getElementById("resetMatchesBtn")?.addEventListener("click", async () => { if(await Swal.fire({title:"Reset semua match?", icon:"warning", showCancelButton:true}).then(r=>r.isConfirmed)) { scoreMatches = []; scoreNextMatchId = 1; saveScoreMatches(); renderAdminPanel(); } });
        
        // Render Matches
        const matchesDiv = document.getElementById("matchesContainer");
        if(matchesDiv) {
            matchesDiv.innerHTML = scoreMatches.map((match, idx) => `<div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:15px; flex-wrap:wrap; gap:10px;">
                <strong>🏆 ${escapeHtml(match.matchName)}</strong> 
                <div style="display:flex; gap:8px; flex-wrap:wrap;">
                    <button class="btn btn-outline btn-sm" onclick="window.duplicateMatch(${idx})"><i class="fas fa-copy"></i> Duplikat</button>
                    <button class="btn btn-outline btn-sm" onclick="window.clearMatchResults(${idx})"><i class="fas fa-eraser"></i> Kosongkan</button>
                    <button class="btn btn-danger btn-sm" onclick="window.deleteMatch(${idx})"><i class="fas fa-trash"></i> Hapus</button>
                </div>
            </div>
            <div class="table-wrapper"><table><thead><tr><th>Player</th><th>Slot</th><th>Peringkat</th><th>Kill</th><th>Skor</th><th>Aksi</th></tr></thead><tbody id="matchBody-${idx}">${match.results.map((res, ri) => { const player = scorePlayers.find(p=>p.id===res.playerId); return `<tr><td>${player ? player.name : 'Unknown'}</td><td>${player ? player.slot : '-'}</td><td><input type="number" class="rank-input" data-m="${idx}" data-r="${ri}" value="${res.rank}"></td><td><input type="number" class="kill-input" data-m="${idx}" data-r="${ri}" value="${res.kills}"></td><td class="total-cell">${calcScore(res.rank, res.kills)}</td><td><button onclick="deleteResult(${idx},${ri})" class="action-btn btn-sm">Hapus</button></td></tr>`; }).join('')}</tbody></table></div>
            <button class="btn btn-outline btn-sm" onclick="addResultToMatch(${idx})" style="margin-top:10px;">+ Tambah Hasil Player</button></div>`).join('');
            document.querySelectorAll('.rank-input').forEach(inp => inp.addEventListener('change', function() { let m=parseInt(this.dataset.m), r=parseInt(this.dataset.r); scoreMatches[m].results[r].rank = parseInt(this.value) || 1; saveScoreMatches(); renderAdminPanel(); }));
            document.querySelectorAll('.kill-input').forEach(inp => inp.addEventListener('change', function() { let m=parseInt(this.dataset.m), r=parseInt(this.dataset.r); scoreMatches[m].results[r].kills = parseInt(this.value) || 0; saveScoreMatches(); renderAdminPanel(); }));
        }
        
        // Final Ranking
        const finalDiv = document.getElementById("finalRanking");
        if(finalDiv && scorePlayers.length) finalDiv.innerHTML = [...scorePlayers].sort((a,b)=>getPlayerScore(b.id)-getPlayerScore(a.id)).map((p,i)=>`<div class="rank-item ${i===0?'top1':i===1?'top2':i===2?'top3':''}"><div><strong>${i+1}.</strong> ${p.name} (${p.slot})</div><div style="color:var(--yellow); font-weight:bold;">${getPlayerScore(p.id)} pts</div></div>`).join('');
        
        // Render Player Table
        const renderPlayerTable = (data) => {
            const tbody = document.getElementById("adminPlayerList");
            if(!tbody) return;
            tbody.innerHTML = data.sort((a,b)=>SLOTS.indexOf(a.slot)-SLOTS.indexOf(b.slot)).map(player => `<tr>
                <td><span class="slot-badge">${player.slot||'-'}</span></td>
                <td><strong>${escapeHtml(player.playerName)}</strong></td>
                <td>${escapeHtml(player.perwakilan)}</td>
                <td>${escapeHtml(player.provinsi || '-')}</td>
                <td>${escapeHtml(player.kota || '-')}</td>
                <td>${player.uid || '-'}</td>
                <td>${escapeHtml(player.nickname || '-')}</td>
                <td><span class="badge ${player.status==='active'?'badge-active':player.status==='banned'?'badge-banned':'badge-cancelled'}">${player.status==='active'?'Active':player.status==='banned'?'BANNED':'Cancelled'}</span></td>
                <td>
                    <button class="action-btn" onclick="window.editPlayerFull('${player.id}')"><i class="fas fa-edit"></i></button>
                    <button class="action-btn" onclick="window.changePassword('${player.id}')"><i class="fas fa-key"></i></button>
                    <button class="action-btn" onclick="window.banPlayer('${player.id}')"><i class="fas fa-gavel"></i></button>
                    <button class="action-btn" onclick="window.deletePlayer('${player.id}')"><i class="fas fa-trash"></i></button>
                    <button class="action-btn" onclick="window.moveSlot('${player.id}')"><i class="fas fa-exchange-alt"></i></button>
                 </tr>
            `).join('');
        };
        renderPlayerTable(players);
        document.getElementById("searchAdmin")?.addEventListener("input", (e) => renderPlayerTable(players.filter(p=>p.playerName?.toLowerCase().includes(e.target.value.toLowerCase()))));
        
        document.getElementById("adminResetSlot")?.addEventListener("click", async () => { 
            if(await Swal.fire({title:"Reset Semua Slot?", text:"Semua player akan di-cancel", icon:"warning", showCancelButton:true}).then(r=>r.isConfirmed)) { 
                const batch = db.batch(); 
                players.forEach(p=>{ if(p.id) batch.update(db.collection("players").doc(p.id), { status: "cancelled" }); }); 
                await batch.commit(); 
                showToast("success","Semua slot telah direset"); 
                renderAdminPanel(); 
            } 
        });
        
        document.getElementById("adminCancelAll")?.addEventListener("click", async () => { 
            if(await Swal.fire({title:"Cancel Semua Peserta?", icon:"warning", showCancelButton:true}).then(r=>r.isConfirmed)) { 
                const batch = db.batch(); 
                players.filter(p=>p.status==="active").forEach(player=>{ batch.update(db.collection("players").doc(player.id), { status: "cancelled" }); }); 
                await batch.commit(); 
                showToast("success","Semua peserta telah dicancel"); 
                renderAdminPanel(); 
            } 
        });
        
        document.getElementById("addPlayerBtn")?.addEventListener("click", async () => { 
            const { value: form } = await Swal.fire({ 
                title: "Registrasi Player Manual", 
                html: `<div class="form-group"><label>Nama Player</label><input id="mPlayerName" class="swal2-input"></div>
                       <div class="form-group"><label>Perwakilan Daerah</label><input id="mWakil" class="swal2-input"></div>
                       <div class="form-group"><label>WhatsApp</label><input id="mWa" class="swal2-input"></div>
                       <div class="form-group"><label>Provinsi</label><select id="mProvinsi" class="swal2-select"><option value="">-- Pilih --</option>${Object.keys(indonesiaCities).map(p=>`<option value="${p}">${p}</option>`).join('')}</select></div>
                       <div class="form-group"><label>Kota</label><select id="mKota" class="swal2-select" disabled><option value="">-- Pilih Kota --</option></select></div>
                       <div class="form-group"><label>UID Game</label><input id="mUid" class="swal2-input"></div>
                       <div class="form-group"><label>Nickname In-Game</label><input id="mNickname" class="swal2-input"></div>
                       <div class="form-group"><label>Password</label><input type="password" id="mPass" class="swal2-input"></div>`, 
                preConfirm: () => ({ 
                    playerName: document.getElementById("mPlayerName")?.value, 
                    perwakilan: document.getElementById("mWakil")?.value, 
                    whatsapp: document.getElementById("mWa")?.value, 
                    provinsi: document.getElementById("mProvinsi")?.value,
                    kota: document.getElementById("mKota")?.value,
                    uid: document.getElementById("mUid")?.value,
                    nickname: document.getElementById("mNickname")?.value,
                    password: document.getElementById("mPass")?.value 
                }), 
                background: "#1A1F2E", 
                didOpen: () => {
                    const provSelect = document.getElementById("mProvinsi");
                    const citySelect = document.getElementById("mKota");
                    provSelect.addEventListener("change", () => {
                        const prov = provSelect.value;
                        citySelect.innerHTML = '<option value="">-- Pilih Kota --</option>';
                        if(prov && indonesiaCities[prov]) {
                            indonesiaCities[prov].forEach(city => {
                                const opt = document.createElement("option");
                                opt.value = city;
                                opt.textContent = city;
                                citySelect.appendChild(opt);
                            });
                            citySelect.disabled = false;
                        } else {
                            citySelect.disabled = true;
                        }
                    });
                }
            });
            if(form && form.playerName) {
                const allPlayers = (await db.collection("players").get()).docs.map(d=>d.data()).filter(p=>p.status==="active");
                const slot = await getAvailableSlot(allPlayers);
                if(!slot) { showToast("error","Slot penuh"); return; }
                if(!form.provinsi || !form.kota) { showToast("error","Provinsi dan Kota wajib diisi"); return; }
                if(!form.uid || !/^\d+$/.test(form.uid)) { showToast("error","UID harus angka"); return; }
                await db.collection("players").add({ 
                    playerName: form.playerName, 
                    perwakilan: form.perwakilan, 
                    whatsapp: form.whatsapp, 
                    provinsi: form.provinsi,
                    kota: form.kota,
                    uid: form.uid,
                    nickname: form.nickname,
                    password: encryptPassword(form.password || "default123"), 
                    slot: slot, 
                    status: "active", 
                    createdAt: new Date().toISOString() 
                });
                showToast("success",`Player ditambahkan dengan slot ${slot}`); 
                renderAdminPanel();
            }
        });
        
        showLoading(false);
    }
    
    // ========== FUNGSI EDIT PLAYER ==========
    window.editPlayerFull = async (id) => {
        const doc = await db.collection("players").doc(id).get();
        const player = doc.data();
        if(!player) return;
        
        const { value: formData } = await Swal.fire({
            title: `Edit Player: ${player.playerName}`,
            html: `<div class="form-group"><label>Nama Player</label><input id="editPlayerName" value="${escapeHtml(player.playerName)}" class="swal2-input"></div>
                   <div class="form-group"><label>Perwakilan</label><input id="editWakil" value="${escapeHtml(player.perwakilan)}" class="swal2-input"></div>
                   <div class="form-group"><label>WhatsApp</label><input id="editWhatsapp" value="${player.whatsapp}" class="swal2-input"></div>
                   <div class="form-group"><label>Provinsi</label><select id="editProvinsi" class="swal2-select"><option value="">-- Pilih --</option>${Object.keys(indonesiaCities).map(p=>`<option value="${p}" ${player.provinsi===p?'selected':''}>${p}</option>`).join('')}</select></div>
                   <div class="form-group"><label>Kota</label><select id="editKota" class="swal2-select"><option value="">-- Pilih Kota --</option></select></div>
                   <div class="form-group"><label>UID Game</label><input id="editUid" value="${player.uid || ''}" class="swal2-input"></div>
                   <div class="form-group"><label>Nickname In-Game</label><input id="editNickname" value="${escapeHtml(player.nickname || '')}" class="swal2-input"></div>`,
            width: "600px",
            background: "#1A1F2E",
            didOpen: () => {
                const provSelect = document.getElementById("editProvinsi");
                const citySelect = document.getElementById("editKota");
                const populateCities = (prov) => {
                    citySelect.innerHTML = '<option value="">-- Pilih Kota --</option>';
                    if(prov && indonesiaCities[prov]) {
                        indonesiaCities[prov].forEach(city => {
                            const opt = document.createElement("option");
                            opt.value = city;
                            opt.textContent = city;
                            if(player.kota === city) opt.selected = true;
                            citySelect.appendChild(opt);
                        });
                        citySelect.disabled = false;
                    } else {
                        citySelect.disabled = true;
                    }
                };
                populateCities(player.provinsi);
                provSelect.addEventListener("change", () => populateCities(provSelect.value));
            },
            preConfirm: () => {
                const provinsi = document.getElementById("editProvinsi")?.value;
                const kota = document.getElementById("editKota")?.value;
                const uid = document.getElementById("editUid")?.value;
                if(!provinsi || !kota) { Swal.showValidationMessage("Provinsi dan Kota wajib diisi"); return false; }
                if(uid && !/^\d+$/.test(uid)) { Swal.showValidationMessage("UID harus angka"); return false; }
                return {
                    playerName: document.getElementById("editPlayerName")?.value.trim() || '',
                    perwakilan: document.getElementById("editWakil")?.value.trim() || '',
                    whatsapp: document.getElementById("editWhatsapp")?.value.trim() || '',
                    provinsi: provinsi,
                    kota: kota,
                    uid: uid,
                    nickname: document.getElementById("editNickname")?.value.trim() || ''
                };
            }
        });
        
        if(formData && formData.playerName && /^08[0-9]{8,13}$/.test(formData.whatsapp)) {
            await db.collection("players").doc(id).update(formData);
            showToast("success", "Data player berhasil diupdate");
            renderAdminPanel();
        } else if(formData) {
            showToast("error", "WhatsApp tidak valid (harus 08xxxx)");
        }
    };
    
    window.changePassword = async (id) => {
        const doc = await db.collection("players").doc(id).get();
        const player = doc.data();
        if(!player) return;
        
        const { value: newPassword } = await Swal.fire({
            title: `Ubah Password: ${player.playerName}`,
            text: "Masukkan password baru (minimal 6 karakter)",
            input: "password",
            inputPlaceholder: "Password baru",
            background: "#1A1F2E",
            color: "#fff",
            preConfirm: (pwd) => {
                if(!pwd || pwd.length < 6) {
                    Swal.showValidationMessage("Password minimal 6 karakter");
                    return false;
                }
                return pwd;
            }
        });
        
        if(newPassword) {
            await db.collection("players").doc(id).update({ password: encryptPassword(newPassword) });
            showToast("success", "Password berhasil diubah!");
        }
    };
    
    // ========== ADMIN ACTIONS ==========
    window.deleteMatch = (idx) => { scoreMatches.splice(idx,1); saveScoreMatches(); renderAdminPanel(); };
    window.deleteResult = (mIdx, rIdx) => { scoreMatches[mIdx].results.splice(rIdx,1); saveScoreMatches(); renderAdminPanel(); };
    window.deleteRank = (rank) => { if(Object.keys(scoreRankPoints).length>1) { delete scoreRankPoints[rank]; saveScoreRankPoints(); renderAdminPanel(); } else showToast("error","Minimal 1 peringkat"); };
    window.addResultToMatch = (matchIdx) => {
        if(!scorePlayers.length) { showToast("error","Tidak ada player"); return; }
        Swal.fire({ title: `Tambah Hasil ke ${scoreMatches[matchIdx].matchName}`, html: `<select id="playerSelect" class="swal2-select">${scorePlayers.map(p=>`<option value="${p.id}">${p.name} (${p.slot})</option>`).join('')}</select><input id="rankInput" class="swal2-input" placeholder="Peringkat" type="number" min="1"><input id="killInput" class="swal2-input" placeholder="Kill" type="number" min="0" value="0">`, preConfirm: () => ({ playerId: document.getElementById("playerSelect").value, rank: parseInt(document.getElementById("rankInput").value), kills: parseInt(document.getElementById("killInput").value) || 0 }), background: "#1A1F2E" }).then(res => { if(res.value) { if(scoreMatches[matchIdx].results.find(r=>r.playerId===res.value.playerId)) { showToast("error","Player sudah ada di match ini"); return; } scoreMatches[matchIdx].results.push(res.value); saveScoreMatches(); renderAdminPanel(); } });
    };
    
    window.banPlayer = async (id) => { 
        const player = (await db.collection("players").doc(id).get()).data(); 
        const existingBan = await db.collection("bannedPlayers").where("playerName","==",player.playerName).get();
        if(!existingBan.empty){
            const confirm = await Swal.fire({title:"Copot BAN",text:`Player "${player.playerName}" sedang di-BAN. Copot?`, icon:"question", showCancelButton:true, background:"#1A1F2E"});
            if(confirm.isConfirmed){ await db.collection("bannedPlayers").doc(existingBan.docs[0].id).delete(); await db.collection("players").doc(id).update({status:"active"}); showToast("success","BAN dicopot"); renderAdminPanel(); }
            return;
        }
        const { value: reason } = await Swal.fire({ title: `Ban Player: ${player.playerName}`, input: "text", inputPlaceholder: "Alasan BAN", background: "#1A1F2E" }); 
        if(reason) { await db.collection("bannedPlayers").add({ playerName: player.playerName, reason, bannedAt: new Date().toISOString() }); await db.collection("players").doc(id).update({ status: "banned" }); showToast("success","Player di-BAN"); renderAdminPanel(); } 
    };
    
    window.deletePlayer = async (id) => { 
        const player = (await db.collection("players").doc(id).get()).data();
        if(await Swal.fire({title:"Hapus Player?", text:`Yakin hapus ${player.playerName}? Data permanen!`, icon:"warning", showCancelButton:true}).then(r=>r.isConfirmed)) { 
            await db.collection("players").doc(id).delete(); 
            showToast("success","Player dihapus"); 
            renderAdminPanel(); 
        } 
    };
    
    window.moveSlot = async (id) => { 
        const players = (await db.collection("players").get()).docs.map(d=>d.data()).filter(p=>p.status==="active" && p.id!==id); 
        const taken = players.map(p=>p.slot); 
        const avail = SLOTS.filter(s=>!taken.includes(s)); 
        if(!avail.length) { showToast("error","Tidak ada slot kosong"); return; } 
        const { value: newSlot } = await Swal.fire({ title: "Pindah Slot", input: "select", inputOptions: avail.reduce((a,s)=>({...a,[s]:s}),{}), background: "#1A1F2E" }); 
        if(newSlot) { await db.collection("players").doc(id).update({ slot: newSlot }); showToast("success",`Slot dipindah ke ${newSlot}`); renderAdminPanel(); } 
    };
    
    window.duplicateMatch = (idx) => {
        const originalMatch = scoreMatches[idx];
        if(!originalMatch) return;
        const newMatch = { matchId: scoreNextMatchId++, matchName: `${originalMatch.matchName} (Copy)`, results: [...originalMatch.results.map(r => ({ ...r }))] };
        scoreMatches.push(newMatch);
        saveScoreMatches();
        showToast("success", `Match "${newMatch.matchName}" berhasil diduplikasi!`);
        renderAdminPanel();
    };
    
    window.clearMatchResults = (idx) => {
        Swal.fire({ title: "Kosongkan Match?", text: `Semua hasil di "${scoreMatches[idx].matchName}" akan dihapus!`, icon: "warning", showCancelButton: true, background: "#1A1F2E" }).then(res => { if(res.isConfirmed) { scoreMatches[idx].results = []; saveScoreMatches(); showToast("success", "Hasil match telah dikosongkan!"); renderAdminPanel(); } });
    };
    
    function checkLogin() { 
        if(!adminLoggedIn) { 
            const pwd = prompt("Admin Password:"); 
            if(pwd === "FastTour2025") {
                adminLoggedIn = true; 
                renderAdminPanel();
            } else { 
                alert("Password salah!"); 
                document.getElementById("adminContent").innerHTML = "<div class='card'><h2>Akses Ditolak</h2><p>Silakan refresh dan masukkan password yang benar.</p></div>";
                showLoading(false);
            } 
        } else { 
            renderAdminPanel(); 
        } 
    }
    
    setTimeout(() => { checkLogin(); }, 100);
</script>
</body>
</html>
