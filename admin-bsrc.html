        :root {
            --yellow: #FFD600;
            --yellow-dark: #E6B800;
            --blue: #0A2E5C;
            --blue-light: #1A3D6E;
            --dark: #0A0E1A;
            --gray: #1A1F2E;
            --gray-light: #2A2F3E;
            --white: #FFFFFF;
            --text-light: #E0E4F0;
            --border: #2A2F3E;
            --success: #10B981;
            --danger: #DC2626;
            --warning: #F59E0B;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        body { background: var(--dark); color: var(--text-light); padding: 20px; }
        .card { background: var(--gray); border-radius: 20px; padding: 1.8rem; margin-bottom: 1.8rem; border: 1px solid var(--border); max-width: 1400px; margin-left: auto; margin-right: auto; box-shadow: 0 4px 15px rgba(0,0,0,0.3); }
        .card h2 { color: var(--yellow); margin-bottom: 1.2rem; font-size: 1.4rem; border-bottom: 3px solid var(--yellow); display: inline-block; padding-bottom: 0.4rem; }
        .card h3 { color: var(--yellow); margin: 1.2rem 0 0.7rem 0; font-size: 1rem; }
        .form-group { margin-bottom: 1.2rem; }
        .form-group label { display: block; margin-bottom: 0.4rem; font-weight: 600; color: var(--yellow); font-size: 0.85rem; }
        input, select, textarea { width: 100%; padding: 12px 16px; background: var(--gray-light); border: 1px solid var(--blue-light); border-radius: 12px; color: white; font-size: 0.9rem; outline: none; transition: all 0.2s ease; }
        input:focus, select:focus { border-color: var(--yellow); box-shadow: 0 0 0 3px rgba(255,214,0,0.2); background: var(--gray); }
        .btn { padding: 12px 28px; border: none; border-radius: 12px; font-weight: 700; cursor: pointer; transition: all 0.25s ease; font-size: 0.9rem; margin: 5px; display: inline-flex; align-items: center; gap: 10px; }
        .btn-primary { background: linear-gradient(135deg, var(--yellow), #FFB800); color: var(--blue); }
        .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(255,214,0,0.3); }
        .btn-outline { background: transparent; border: 2px solid var(--yellow); color: var(--yellow); }
        .btn-outline:hover { background: var(--yellow); color: var(--blue); transform: translateY(-2px); }
        .btn-danger { background: linear-gradient(135deg, var(--danger), #B91C1C); color: white; }
        .btn-danger:hover { transform: translateY(-2px); }
        .btn-success { background: linear-gradient(135deg, var(--success), #059669); color: white; }
        .btn-sm { padding: 6px 14px; font-size: 0.7rem; gap: 6px; }
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 1.5rem; margin-bottom: 2rem; }
        .stat-card { background: linear-gradient(135deg, var(--gray), #1f2436); border-radius: 20px; padding: 1.5rem; text-align: center; border-left: 5px solid var(--yellow); transition: all 0.3s ease; }
        .stat-card:hover { transform: translateY(-5px); }
        .stat-card i { font-size: 2.2rem; color: var(--yellow); margin-bottom: 0.7rem; }
        .stat-card h2 { font-size: 2.2rem; color: white; }
        .stat-card p { color: #8ba0c0; font-size: 0.85rem; }
        .table-wrapper { overflow-x: auto; border-radius: 16px; margin-top: 1rem; }
        table { width: 100%; border-collapse: collapse; font-size: 0.85rem; }
        th, td { padding: 14px 12px; text-align: left; border-bottom: 1px solid var(--border); vertical-align: middle; }
        th { color: var(--yellow); font-weight: 700; background: rgba(42,47,62,0.8); white-space: nowrap; }
        tr:hover td { background: rgba(255,214,0,0.05); }
        .slot-badge { display: inline-block; background: linear-gradient(135deg, var(--yellow), #FFB800); color: var(--blue); padding: 5px 12px; border-radius: 20px; font-weight: 800; font-size: 0.75rem; min-width: 55px; text-align: center; }
        .badge { display: inline-block; padding: 5px 14px; border-radius: 20px; font-size: 0.7rem; font-weight: 700; }
        .badge-active { background: linear-gradient(135deg, #10B981, #059669); color: white; }
        .badge-cancelled { background: linear-gradient(135deg, #EF4444, #DC2626); color: white; }

        .action-btn { background: var(--gray-light); border: none; color: var(--yellow); cursor: pointer; margin: 0 4px; font-size: 0.9rem; padding: 8px 14px; border-radius: 10px; transition: all 0.2s; }
        .action-btn:hover { background: var(--yellow); color: var(--blue); transform: scale(1.05); }
        .search-bar { display: flex; gap: 1rem; flex-wrap: wrap; margin-bottom: 1.5rem; align-items: center; }
        .search-bar input, .search-bar select { padding: 12px 18px; background: var(--gray-light); border: 1px solid var(--border); border-radius: 12px; color: white; font-size: 0.85rem; flex: 1; min-width: 180px; }

        .admin-header h1 { color: var(--yellow); font-size: 1.8rem; display: flex; align-items: center; gap: 12px; }
        .loading { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); display: flex; align-items: center; justify-content: center; z-index: 9999; }
        .spinner { width: 55px; height: 55px; border: 4px solid var(--gray-light); border-top-color: var(--yellow); border-radius: 50%; animation: spin 0.8s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .rank-list { display: flex; flex-direction: column; gap: 10px; margin-top: 15px; }
        .rank-item { background: var(--gray-light); border-radius: 14px; padding: 14px 20px; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; }
        .rank-item.top1 { background: linear-gradient(135deg, #2a1f0a, #1f2436); border-left: 5px solid #fbbf24; }
        .rank-item.top2 { background: linear-gradient(135deg, #1a1f2a, #1f2436); border-left: 5px solid #94a3b8; }
        .rank-item.top3 { background: linear-gradient(135deg, #2a1a1a, #1f2436); border-left: 5px solid #cd7f32; }
        .points-container { display: flex; flex-wrap: wrap; gap: 12px; margin: 15px 0; }
        .point-chip { background: var(--gray-light); border-radius: 30px; padding: 8px 16px; display: flex; align-items: center; gap: 12px; }
        .point-chip input { width: 65px; background: var(--dark); border: 1px solid var(--border); border-radius: 8px; padding: 5px 8px; color: var(--yellow); text-align: center; }
        .rank-input, .kill-input { width: 75px; text-align: center; padding: 7px 10px; background: var(--dark); border: 1px solid var(--border); border-radius: 10px; color: white; }
        .total-cell { color: var(--yellow); font-weight: 800; }
        @media (max-width: 768px) {

            table { min-width: 800px; }

        .form-row { display: flex; gap: 1rem; margin-bottom: 0.8rem; flex-wrap: wrap; }
        .form-row input { flex: 1; min-width: 120px; }
        select.form-select { background: var(--gray-light); color: white; border: 1px solid var(--blue-light); border-radius: 10px; padding: 12px; }
        .location-warning { color: var(--danger); font-size: 0.7rem; margin-top: 5px; display: none; }

    function showLoading(show) { document.getElementById("loading").style.display = show ? "flex" : "none"; }
    function showToast(type, msg) { Swal.fire({ title: type==="success"?"Sukses":"Error", text: msg, icon: type, timer: 2000, showConfirmButton: false, background: "#1A1F2E", color: "#fff" }); }
    function escapeHtml(str) { if(!str) return ''; return str.replace(/[&<>]/g, m => m === '&' ? '&amp;' : m === '<' ? '&lt;' : '&gt;'); }
    function encryptPassword(pwd) { return btoa(pwd); }
    function decryptPassword(encrypted) { try { return atob(encrypted); } catch(e) { return "???"; } }
    function formatDate(dateStr) { return dateStr ? new Date(dateStr).toLocaleString('id-ID') : "-"; }
    function calcScore(rank, kills) { return (scoreRankPoints[rank] || 0) + (kills * scoreKillPoint); }
    function getTeamScore(teamId) { let total=0; scoreMatches.forEach(m=>{ const r=m.results.find(r=>r.teamId===teamId); if(r) total+=calcScore(r.rank, r.kills); }); return total; }
    function saveScoreMatches() { localStorage.setItem('bsrc_score_matches', JSON.stringify(scoreMatches)); }
    function saveScoreRankPoints() { localStorage.setItem('bsrc_score_rankPoints', JSON.stringify(scoreRankPoints)); }
    function saveScoreKillPoint() { localStorage.setItem('bsrc_score_killPoint', scoreKillPoint); }
    
    async function loadScoreData() {
        const teamsSnap = await db.collection("teams").where("status", "==", "active").get();
        scoreTeams = teamsSnap.docs.map(doc => ({ id: doc.id, name: doc.data().teamName, slot: doc.data().slot || '-', perwakilan: doc.data().perwakilan }));
        const savedMatches = localStorage.getItem('bsrc_score_matches');
        if(savedMatches) { scoreMatches = JSON.parse(savedMatches); if(scoreMatches.length) scoreNextMatchId = Math.max(...scoreMatches.map(m=>m.matchId)) + 1; }
        const savedRank = localStorage.getItem('bsrc_score_rankPoints');
        if(savedRank) scoreRankPoints = JSON.parse(savedRank);
        const savedKill = localStorage.getItem('bsrc_score_killPoint');
        if(savedKill) scoreKillPoint = parseFloat(savedKill);
    }
    
    async function getAvailableSlot(teams) { const taken = teams.map(t=>t.slot); for(let s of SLOTS) if(!taken.includes(s)) return s; return null; }
    async function loadCountdownSetting() { const settingDoc = await db.collection("settings").doc("tournament").get(); if (settingDoc.exists && settingDoc.data().countdownDate) countdownTarget = new Date(settingDoc.data().countdownDate); }
    async function saveCountdownSetting(newDate) { await db.collection("settings").doc("tournament").set({ countdownDate: newDate.toISOString() }); countdownTarget = newDate; }
    
    function updateCityOptions(provinsiId, kotaId) {
        const provinceSelect = document.getElementById(provinsiId);
        const citySelect = document.getElementById(kotaId);
        if (!provinceSelect || !citySelect) return;
        const selectedProvince = provinceSelect.value;
        citySelect.innerHTML = '<option value="">-- Pilih Kabupaten/Kota --</option>';
        if (selectedProvince && indonesiaCities[selectedProvince]) {
            indonesiaCities[selectedProvince].forEach(city => {
                const option = document.createElement("option");
                option.value = city;
                option.textContent = city;
                citySelect.appendChild(option);
            });
            citySelect.disabled = false;
        } else {
            citySelect.disabled = true;
        }
    }

                       <div class="form-group"><label>Perwakilan</label><input id="mWakil" class="swal2-input" style="background:#2A2F3E;color:white;"></div>

    // ========== FUNGSI EDIT LENGKAP ==========
    window.editTeamFull = async (id) => {
        const doc = await db.collection("teams").doc(id).get();
        const team = doc.data();
        if(!team) return;
        
        const playersHtml = team.players.slice(0,4).map((p,i)=>`<div class="form-row"><input id="editNick${i+1}" value="${escapeHtml(p.nick)}" placeholder="Nick ${i+1}" style="background:#2A2F3E;color:white;"><input id="editUid${i+1}" value="${p.uid}" placeholder="UID ${i+1}" style="background:#2A2F3E;color:white;"></div>`).join('');
        const cadangan = team.players[4] || { nick: "", uid: "" };
        
        const { value: formData } = await Swal.fire({
            title: `Edit Team: ${team.teamName}`,
            html: `<div class="form-group"><label>Nama Team</label><input id="editTeamName" value="${escapeHtml(team.teamName)}" style="background:#2A2F3E;color:white;"></div>
                   <div class="form-group"><label>Perwakilan</label><input id="editWakil" value="${escapeHtml(team.perwakilan)}" style="background:#2A2F3E;color:white;"></div>
                   <div class="form-group"><label>WhatsApp</label><input id="editWhatsapp" value="${team.whatsapp}" style="background:#2A2F3E;color:white;"></div>
                   <div class="form-group"><label>Provinsi</label><select id="editProvinsi" class="swal2-select" style="background:#2A2F3E;color:white;"><option value="">-- Pilih --</option>${Object.keys(indonesiaCities).map(p=>`<option value="${p}" ${team.provinsi===p?'selected':''}>${p}</option>`).join('')}</select></div>
                   <div class="form-group"><label>Kota</label><select id="editKota" class="swal2-select" style="background:#2A2F3E;color:white;"><option value="">-- Pilih Kota --</option></select></div>
                   <h3>Pemain Utama</h3>${playersHtml}
                   <h3>Cadangan</h3>
                   <div class="form-row"><input id="editNickCad" value="${escapeHtml(cadangan.nick)}" placeholder="Nick Cadangan" style="background:#2A2F3E;color:white;"><input id="editUidCad" value="${cadangan.uid}" placeholder="UID Cadangan" style="background:#2A2F3E;color:white;"></div>`,
            width: "600px",
            background: "#1A1F2E",
            didOpen: () => {
                const provSelect = document.getElementById("editProvinsi");
                const citySelect = document.getElementById("editKota");
                const populateCities = (prov) => {
                    citySelect.innerHTML = '<option value="">-- Pilih Kota --</option>';
                    if(prov && indonesiaCities[prov]) {
                        indonesiaCities[prov].forEach(city => {
                            const opt = document.createElement("option");
                            opt.value = city;
                            opt.textContent = city;
                            if(team.kota === city) opt.selected = true;
                            citySelect.appendChild(opt);
                        });
                        citySelect.disabled = false;
                    } else {
                        citySelect.disabled = true;
                    }
                };
                populateCities(team.provinsi);
                provSelect.addEventListener("change", () => populateCities(provSelect.value));
            },
            preConfirm: () => {
                const newPlayers = [];
                for(let i=1;i<=4;i++) {
                    const nick = document.getElementById(`editNick${i}`)?.value.trim() || '';
                    const uid = document.getElementById(`editUid${i}`)?.value.trim() || '';
                    if(!nick || !uid) { Swal.showValidationMessage(`Player ${i} tidak lengkap`); return false; }
                    if(!/^\d+$/.test(uid)) { Swal.showValidationMessage(`UID harus angka`); return false; }
                    newPlayers.push({ nick, uid });
                }
                const nickCad = document.getElementById("editNickCad")?.value.trim() || '';
                const uidCad = document.getElementById("editUidCad")?.value.trim() || '';
                if(nickCad && uidCad) {
                    if(!/^\d+$/.test(uidCad)) { Swal.showValidationMessage("UID Cadangan harus angka"); return false; }
                    newPlayers.push({ nick: nickCad, uid: uidCad });
                }
                const provinsi = document.getElementById("editProvinsi")?.value;

                    kota: kota,
                    players: newPlayers

        });
        
        if(formData && formData.teamName && formData.perwakilan && /^08[0-9]{8,13}$/.test(formData.whatsapp)) {
            await db.collection("teams").doc(id).update(formData);
            showToast("success", "Data team berhasil diupdate");
            renderAdminPanel();

            showToast("error", "WhatsApp tidak valid (harus 08xxxx)");

        if(!team) return;
        
        const { value: newPassword } = await Swal.fire({
            title: `Ubah Password: ${team.teamName}`,
            text: "Masukkan password baru (minimal 6 karakter)",
            input: "password",
            inputPlaceholder: "Password baru",
            background: "#1A1F2E",
            color: "#fff",
            preConfirm: (pwd) => {
                if(!pwd || pwd.length < 6) {

    window.banTeam = async (id) => { 
        const team = (await db.collection("teams").doc(id).get()).data(); 
        const existingBan = await db.collection("bannedTeams").where("teamName","==",team.teamName).get();
        if(!existingBan.empty){
            const confirm = await Swal.fire({title:"Copot BAN",text:`Team "${team.teamName}" sedang di-BAN. Copot?`, icon:"question", showCancelButton:true, background:"#1A1F2E"});
            if(confirm.isConfirmed){ await db.collection("bannedTeams").doc(existingBan.docs[0].id).delete(); await db.collection("teams").doc(id).update({status:"active"}); showToast("success","BAN dicopot"); renderAdminPanel(); }
            return;
        }
        const { value: reason } = await Swal.fire({ title: `Ban Team: ${team.teamName}`, input: "text", inputPlaceholder: "Alasan BAN", background: "#1A1F2E" }); 
        if(reason) { await db.collection("bannedTeams").add({ teamName: team.teamName, reason, bannedAt: new Date().toISOString() }); await db.collection("teams").doc(id).update({ status: "banned" }); showToast("success","Team di-BAN"); renderAdminPanel(); } 
    };
    
    window.deleteTeam = async (id) => {

            await db.collection("teams").doc(id).delete(); 
            showToast("success","Team dihapus"); 
            renderAdminPanel(); 
        } 
    };
    
    window.moveSlot = async (id) => { 
        const teams = (await db.collection("teams").get()).docs.map(d=>d.data()).filter(t=>t.status==="active" && t.id!==id); 
        const taken = teams.map(t=>t.slot); 
        const avail = SLOTS.filter(s=>!taken.includes(s)); 
        if(!avail.length) { showToast("error","Tidak ada slot kosong"); return; } 
        const { value: newSlot } = await Swal.fire({ title: "Pindah Slot", input: "select", inputOptions: avail.reduce((a,s)=>({...a,[s]:s}),{}), background: "#1A1F2E" }); 
        if(newSlot) { await db.collection("teams").doc(id).update({ slot: newSlot }); showToast("success",`Slot dipindah ke ${newSlot}`); renderAdminPanel(); } 
    };
    
    window.duplicateMatch = (idx) => {
        const originalMatch = scoreMatches[idx];
        if(!originalMatch) return;
        const newMatch = { matchId: scoreNextMatchId++, matchName: `${originalMatch.matchName} (Copy)`, results: [...originalMatch.results.map(r => ({ ...r }))] };
        scoreMatches.push(newMatch);
        saveScoreMatches();
        showToast("success", `Match "${newMatch.matchName}" berhasil diduplikasi!`);
        renderAdminPanel();
    };
    
    window.clearMatchResults = (idx) => {
        Swal.fire({ title: "Kosongkan Match?", text: `Semua hasil di "${scoreMatches[idx].matchName}" akan dihapus!`, icon: "warning", showCancelButton: true, background: "#1A1F2E" }).then(res => { if(res.isConfirmed) { scoreMatches[idx].results = []; saveScoreMatches(); showToast("success", "Hasil match telah dikosongkan!"); renderAdminPanel(); } });
    };
    
function checkLogin() { 
    if(!adminLoggedIn) { 
        const pwd = prompt("Admin Password:"); 
        if(pwd === "FastTour2025") {
            adminLoggedIn = true; 
            renderAdminPanel();
        } else { 
            alert("Password salah!"); 
            document.getElementById("adminContent").innerHTML = "<div class='card'><h2>Akses Ditolak</h2><p>Silakan refresh dan masukkan password yang benar.</p></div>";
            showLoading(false);
        } 
    } else { 
        renderAdminPanel(); 
    } 
}

// PANGGIL LANGSUNG SAAT LOAD
setTimeout(() => {
    checkLogin();
}, 100);
</script>
